<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div role="button" tabindex="0" aria-label="{{ p.title }}" onClick="{{ open }}" onKeyDown="{{ onKey }}" style="cursor:pointer;background:#FFFFFF;border:1px solid #ECE4D6;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;transition:transform .18s ease, box-shadow .18s ease;outline:none;" style-hover="transform:translateY(-4px);box-shadow:0 18px 40px -22px rgba(44,42,38,.45);" style-focus="box-shadow:0 0 0 3px rgba(212,106,74,.4);">
  <div style="position:relative;aspect-ratio:1/1;background:{{ p.tint }};display:flex;align-items:center;justify-content:center;">
    <div style="position:relative;width:58%;height:58%;">
      <div style="position:absolute;left:6%;bottom:8%;width:46%;height:46%;border-radius:50%;background:rgba(255,255,255,.65);"></div>
      <div style="position:absolute;right:4%;bottom:20%;width:38%;height:38%;border-radius:12px;background:rgba(44,42,38,.14);transform:rotate(8deg);"></div>
      <div style="position:absolute;left:26%;top:2%;width:34%;height:34%;border-radius:50%;background:rgba(255,255,255,.9);"></div>
    </div>
    <span style="position:absolute;left:10px;bottom:9px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.04em;color:rgba(44,42,38,.5);text-transform:uppercase;">foto produs</span>
    <sc-if value="{{ p.badge }}" hint-placeholder-val="{{ true }}">
      <span style="position:absolute;left:12px;top:12px;background:#2C2A26;color:#FBF7EF;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:11px;letter-spacing:.03em;padding:4px 10px;border-radius:999px;text-transform:uppercase;">{{ p.badge }}</span>
    </sc-if>
    <button aria-label="Adaugă în coș" onClick="{{ add }}" style="position:absolute;right:10px;bottom:10px;width:40px;height:40px;border:none;border-radius:50%;background:#D46A4A;color:#fff;font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -6px rgba(212,106,74,.9);transition:transform .15s ease, background .15s ease;" style-hover="background:#B9553A;transform:scale(1.08);">+</button>
  </div>
  <div style="padding:14px 16px 16px;display:flex;flex-direction:column;gap:6px;flex:1;">
    <span style="font-family:'Hanken Grotesque',sans-serif;font-size:12px;font-weight:600;color:#7C9A82;letter-spacing:.02em;">{{ ageStr }}</span>
    <h3 style="margin:0;font-family:'Baloo 2',sans-serif;font-weight:600;font-size:16px;line-height:1.25;color:#2C2A26;">{{ p.title }}</h3>
    <div style="display:flex;align-items:center;gap:5px;font-size:12.5px;color:#6E675E;">
      <span style="color:#E6A94C;letter-spacing:1px;">★★★★★</span>
      <span>{{ ratingStr }}</span>
    </div>
    <div style="margin-top:auto;padding-top:8px;display:flex;align-items:baseline;gap:8px;">
      <span style="font-family:'Baloo 2',sans-serif;font-weight:700;font-size:18px;color:#2C2A26;">{{ priceStr }}</span>
      <sc-if value="{{ hasCompare }}" hint-placeholder-val="{{ true }}">
        <span style="font-size:13px;color:#B0A79A;text-decoration:line-through;">{{ compareStr }}</span>
      </sc-if>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:240,&quot;height&quot;:360},&quot;product&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;},&quot;onOpen&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(p:any)=&gt;void&quot;},&quot;onAdd&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(p:any)=&gt;void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props.product || {};
    const ageStr = p.ageMin == null ? '' : (p.ageMax ? `${p.ageMin}–${p.ageMax} ani` : `${p.ageMin}+ ani`);
    const fmt = (n) => n == null ? '' : `${n} lei`;
    return {
      p,
      ageStr,
      priceStr: fmt(p.price),
      compareStr: fmt(p.compareAt),
      hasCompare: !!(p.compareAt && p.compareAt > p.price),
      ratingStr: p.rating != null ? `${p.rating} (${p.reviews || 0})` : '',
      open: () => this.props.onOpen && this.props.onOpen(p),
      onKey: (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.props.onOpen && this.props.onOpen(p); } },
      add: (e) => { e.stopPropagation(); this.props.onAdd && this.props.onAdd(p); },
    };
  }
}
</script>
</body>
</html>
