document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-size:44px;line-height:1.08;\">Credem în joaca care lasă urme bune<\u002Fh1>\n        <p style=\"margin:0 auto;max-width:640px;font-size:18px;line-height:1.6;color:#4E4840;\">Click Market s-a născut dintr-o frustrare simplă: prea multe jucării fac zgomot și cer baterii, dar prea puține cer copilului să gândească. Am pornit să adunăm doar jocurile care merită timpul unei copilării.<\u002Fp>\n      <\u002Fsection>\n      <section class=\"lud-sec\" style=\"max-width:1120px;margin:0 auto;padding:24px;\">\n        <div style=\"aspect-ratio:21/9;border-radius:26px;background:linear-gradient(135deg,#F7ECD9,#E7EFE7);position:relative;display:flex;align-items:center;justify-content:center;\"><div style=\"width:22%;height:44%;border-radius:24px;background:rgba(255,255,255,.6);\"><\u002Fdiv><span style=\"position:absolute;left:16px;bottom:14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(44,42,38,.45);text-transform:uppercase;\">foto · echipa / atelier<\u002Fspan><\u002Fdiv>\n      <\u002Fsection>\n      <section class=\"lud-sec\" style=\"max-width:1000px;margin:0 auto;padding:36px 24px;\">\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\" class=\"lud-grid3\">\n          <sc-for list=\"{{ aboutValues }}\" as=\"v\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border:1px solid #ECE4D6;border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:10px;\">\n              <div style=\"width:44px;height:44px;border-radius:13px;background:{{ v.tint }};display:flex;align-items:center;justify-content:center;\"><div style=\"width:18px;height:18px;border-radius:{{ v.shape }};background:{{ v.dot }};\"><\u002Fdiv><\u002Fdiv>\n              <h3 style=\"margin:0;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:18px;\">{{ v.title }}<\u002Fh3>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:#6E675E;\">{{ v.text }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-fo .qty+delta} : l).filter(l => l.qty > 0);\n    return { cart };\n  });\n  removeLine = (key) => this.setState(s => ({ cart: s.cart.filter(l => l.key !== key) }));\n\n  toggleFilter = (type, val) => this.setState(s => {\n    const arr = s.filters[type];\n    const next = arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val];\n    return { filters: {...s.filters, [type]: next} };\n  });\n\n  productAgeBand(p){ if(p.ageMax<=2) return '0-2'; if(p.ageMin>=7) return '7+'; if(p.ageMax<=4) return '3-4'; if(p.ageMax<=6) return '5-6'; return '7+'; }\n\n  renderVals() {\n    const s = this.state;\n    const P = this.products;\n    const threshold = this.props.freeShippingThreshold ?? 250;\n    const byId = id => P.find(p => p.id === id);\n\n    // cart\n    const cartLines = s.cart.map(l => ({\n      ...l, totalStr: this.fmt(l.price*l.qty),\n      remove:()=>this.removeLine(l.key), inc:()=>this.changeQty(l.key,1), dec:()=>this.changeQty(l.key,-1),\n    }));\n    const cartCount = s.cart.reduce((n,l)=>n+l.qty,0);\n    const subtotal = s.cart.reduce((n,l)=>n+l.price*l.qty,0);\n    const remaining = Math.max(0, threshold - subtotal);\n    const freeShipPct = Math.min(100, Math.round(subtotal/threshold*100));\n\n    // active product\n    const ap = byId(s.params.id) || P[0];\n    const av = (ap.variants||[])[s.variant] || {name:'Standard'};\n    const galleryThumbs = [0,1,2,3].map(n => ({ n:n+1, tint:ap.tint, border: s.gallery===n ? '#D46A4A' : 'transparent', select:()=>this.setState({gallery:n}) }));\n    const variantChips = (ap.variants||[]).map((v,i)=>({ name:v.name, hex:v.hex, active:s.variant===i, border: s.variant===i ? '#D46A4A' : '#E3D8C6', select:()=>this.setState({variant:i}) }));\n    const accItems = [\n      {key:'descr', title:'Descriere', content: ap.short + ' Fiecare detaliu e gândit ca joaca să rămână provocatoare pe măsură ce copilul crește.'},\n      {key:'specs', title:'Specificații', content:(ap.specs||[]).join(' · ')},\n      {key:'safety', title:'Siguranță', content: ap.safety},\n      {key:'faq', title:'Livrare & retur', content:'Livrare 24–48h prin curier. Retur gratuit în 30 de zile, în ambalajul original.'},\n    ];\n    const accordions = accItems.map(a => ({ title:a.title, content:a.content, open: s.accordion===a.key, rot: s.accordion===a.key ? 'rotate(45deg)' : 'none', toggle:()=>this.setState({accordion: s.accordion===a.key ? '' : a.key}) }));\n    const related = P.filter(p=>p.id!==ap.id && p.cat===ap.cat).slice(0,4);\n    const relatedFilled = related.length>=4 ? related : [...related, ...P.filter(p=>p.id!==ap.id && !related.includes(p))].slice(0,4);\n\n    // collection\n    const catKey = s.params.cat || 'all';\n    const catMeta = this.categories.find(c=>c.key===catKey);\n    const ageMeta = this.ageBands.find(a=>a.key===catKey);\n    let colTitle='Toate jucăriile', colDesc='Jocuri alese cu grijă pentru fiecare etapă a copilăriei.', colTint='#F7ECD9';\n    if(s.params.title){ colTitle=s.params.title; }\n    if(catMeta && catKey!=='all'){ colTitle=catMeta.label; colTint=catMeta.tint; colDesc='Jucării care dezvoltă exact această abilitate, sortate pe vârstă.'; }\n    if(ageMeta){ colTitle=`Jucării ${ageMeta.range} ani`; colDesc=ageMeta.hint+'. Alese pentru această etapă.'; }\n\n    let list = P.slice();\n    if(catMeta && catKey!=='all') list = list.filter(p=>p.cat===catKey || (p.skills||[]).includes(catKey));\n    if(ageMeta) list = list.filter(p=>this.productAgeBand(p)===catKey);\n    const f = s.filters;\n    if(f.age.length) list = list.filter(p=>f.age.includes(this.productAgeBand(p)));\n    if(f.skill.length) list = list.filter(p=>(p.skills||[]).some(sk=>f.skill.includes(sk)));\n    if(f.price.length) list = list.filter(p=>f.price.includes(p.priceBand));\n    if(s.sort==='price-asc') list.sort((a,b)=>a.price-b.price);\n    else if(s.sort==='price-desc') list.sort((a,b)=>b.price-a.price);\n    else if(s.sort==='rating') list.sort((a,b)=>b.rating-a.rating);\n\n    const base = (catMeta && catKey!=='all') ? P.filter(p=>p.cat===catKey||(p.skills||[]).includes(catKey)) : (ageMeta ? P.filter(p=>this.productAgeBand(p)===catKey) : P);\n    const countIn = (pred)=>base.filter(pred).length;\n    const filterGroups = [\n      { label:'Vârstă', options:[['0-2','0–2 ani'],['3-4','3–4 ani'],['5-6','5–6 ani'],['7+','7+ ani']].map(([v,l])=>({label:l, checked:f.age.includes(v), count:countIn(p=>this.productAgeBand(p)===v), toggle:()=>this.toggleFilter('age',v)})) },\n      { label:'Abilitate', options:[['logica','Logică'],['gandire','Gândire'],['constructie','Construcție'],['motricitate','Motricitate'],['matematica','Matematică'],['culori','Culori']].map(([v,l])=>({label:l, checked:f.skill.includes(v), count:countIn(p=>(p.skills||[]).includes(v)), toggle:()=>this.toggleFilter('skill',v)})) },\n      { label:'Preț', options:[['50-100','50–100 lei'],['100-150','100–150 lei'],['150+','peste 150 lei']].map(([v,l])=>({label:l, checked:f.price.includes(v), count:countIn(p=>p.priceBand===v), toggle:()=>this.toggleFilter('price',v)})) },\n    ];\n    const hasFilters = f.age.length||f.skill.length||f.price.length;\n\n    // search\n    const q = s.query.trim().toLowerCase();\n    const matches = q ? P.filter(p=>p.title.toLowerCase().includes(q) || (p.skills||[]).some(sk=>sk.includes(q)) || p.cat.includes(q)) : [];\n    const predictive = matches.slice(0,4).map(p=>({ title:p.title, tint:p.tint, ageStr:this.productAgeBand(p)==='7+'?`${p.ageMin}+ ani`:`${p.ageMin}–${p.ageMax} ani`, priceStr:this.fmt(p.price), open:()=>this.openProduct(p) }));\n    const popularTerms = ['puzzle','cuburi','logică','Montessori','fără ecrane'].map(t=>({label:t, pick:()=>this.setState({query:t})}));\n\n    const navItems = [\n      { label:'Colecție', go:()=>this.openCollection('all') },\n      { label:'Pe vârste', go:()=>this.nav('quiz') },\n      { label:'Blog', go:()=>this.nav('blog') },\n      { label:'Despre noi', go:()=>this.nav('about') },\n      { label:'Contact', go:()=>this.nav('contact') },\n    ];\n    const footerCols = [\n      { title:'Cumpără', links:[\n        {label:'Toate jucăriile', go:()=>this.openCollection('all')},\n        {label:'Bestseller-uri', go:()=>this.openCollection('all')},\n        {label:'Noutăți', go:()=>this.openCollection('all')},\n        {label:'Găsește cadoul', go:()=>this.nav('quiz')} ] },\n      { title:'Ajutor', links:[\n        {label:'Livrare & retur', go:()=>this.nav('shipping')},\n        {label:'Întrebări frecvente', go:()=>this.nav('faq')},\n        {label:'Contact', go:()=>this.nav('contact')},\n        {label:'Urmărește comanda', go:()=>this.nav('contact')} ] },\n      { title:'Click Market', links:[\n        {label:'Despre noi', go:()=>this.nav('about')},\n        {label:'Blog', go:()=>this.nav('blog')},\n        {label:'Siguranță & materiale', go:()=>this.nav('about')} ] },\n    ];\n\n    return {\n      // props / global\n      showAnnouncement: this.props.showAnnouncement ?? true,\n      threshold,\n      isHome: s.screen==='home', isProduct: s.screen==='product', isCollection: s.screen==='collection',\n      cartOpen: s.cartOpen, searchOpen: s.searchOpen, menuOpen: s.menuOpen,\n      cartCount, hasCart: cartCount>0,\n      navItems, footerCols, socials:this.socials,\n      categories: this.categories.map(c=>({...c, go:()=> c.key==='all'?this.openCollection('all'):this.openCollection(c.key)})),\n      ageBands: this.ageBands.map(a=>({...a, go:()=>this.openCollection(a.key)})),\n      benefits:this.benefits, psPoints:this.psPoints, testimonials:this.testimonials,\n      bestsellers: P.filter(p=>p.badge==='Bestseller').concat(P.filter(p=>p.rating>=4.8)).filter((v,i,a)=>a.indexOf(v)===i).slice(0,4),\n      newProducts: P.filter(p=>p.badge==='Nou').concat(P.slice().reverse()).filter((v,i,a)=>a.indexOf(v)===i).slice(0,4),\n      articles: this.articles.map(a=>({...a, go:()=>this.nav('article',{id:a.id})})),\n      // nav handlers\n      goHome:()=>this.nav('home'), goShop:()=>this.openCollection('all'), goQuiz:()=>this.nav('quiz'),\n      goBlog:()=>this.nav('blog'), goShipping:()=>this.nav('shipping'),\n      openProduct:this.openProduct, addToCart:this.addToCartCard,\n      toggleCart:()=>this.setState(x=>({cartOpen:!x.cartOpen})), toggleMenu:()=>this.setState(x=>({menuOpen:!x.menuOpen})),\n      openSearch:()=>this.setState({searchOpen:true}), closeSearch:()=>this.setState({searchOpen:false}),\n      stop:(e)=>e.stopPropagation(), noop:()=>{},\n      // newsletter\n      submitNewsletter:(e)=>{e.preventDefault(); this.setState({newsletterDone:true});}, newsletterDone:s.newsletterDone,\n      // product page\n      activeProduct: ap, ageStr: this.productAgeBand(ap)==='7+'?`${ap.ageMin}+ ani`:`${ap.ageMin}–${ap.ageMax} ani`,\n      priceStr:this.fmt(ap.price), compareStr:this.fmt(ap.compareAt), hasCompare:!!(ap.compareAt&&ap.compareAt>ap.price),\n      discountPct: ap.compareAt ? Math.round((1-ap.price/ap.compareAt)*100) : 0,\n      selectedVariant: av, variantChips, galleryThumbs, galleryNum:s.gallery+1,\n      qty:s.qty, incQty:()=>this.setState(x=>({qty:x.qty+1})), decQty:()=>this.setState(x=>({qty:Math.max(1,x.qty-1)})),\n      lineTotalStr:this.fmt(ap.price*s.qty),\n      addActiveToCart:()=>this.addToCart(ap,s.qty,s.variant), buyNow:()=>{this.addToCart(ap,s.qty,s.variant);},\n      pdpBenefits:[{text:'Livrare 24–48h',dot:'#6E9DC4'},{text:'Retur 30 zile',dot:'#7C9A82'},{text:'Materiale sigure EN71',dot:'#E6A94C'},{text:'Ambalaj cadou',dot:'#D46A4A'}],\n      accordions, relatedProducts: relatedFilled,\n      // collection\n      collectionTitle:colTitle, collectionDesc:colDesc, collectionTint:colTint,\n      collectionProducts:list, resultCount:list.length, hasResults:list.length>0, noResults:list.length===0,\n      filterGroups, hasFilters, clearFilters:()=>this.setState({filters:{age:[],skill:[],price:[]}}),\n      sort:s.sort, setSort:(e)=>this.setState({sort:e.target.value}),\n      // cart drawer\n      cartLines, cartEmpty:cartCount===0, subtotalStr:this.fmt(subtotal),\n      freeShipPct, freeShipMsg: remaining>0 ? `Încă ${remaining} lei până la transport gratuit` : 'Felicitări! Ai transport gratuit 🎉',\n      checkout:()=>{ alert('Redirecționare către Shopify Checkout (nativ) — mock în prototip.'); },\n      goShopFromCart:()=>this.openCollection('all'),\n      // screen flags\n      isQuiz:s.screen==='quiz', isSearch:s.screen==='search', isBlog:s.screen==='blog',\n      isArticle:s.screen==='article', isAbout:s.screen==='about', isContact:s.screen==='contact',\n      isFaq:s.screen==='faq', isShipping:s.screen==='shipping',\n      goBlog:()=>this.nav('blog'), goContact:()=>this.nav('contact'),\n      // quiz\n      ...(() => {\n        const qq = [\n          { key:'age', title:'Ce vârstă are copilul?', opts:[['0-2','0–2 ani'],['3-4','3–4 ani'],['5-6','5–6 ani'],['7+','7+ ani']] },\n          { key:'interest', title:'Ce îl atrage cel mai mult?', opts:[['constructie','Să construiască'],['logica','Să rezolve provocări'],['motricitate','Să manipuleze cu mâinile'],['gandire','Povești & memorie']] },\n          { key:'play', title:'Cum se joacă de obicei?', opts:[['solo','Singur, concentrat'],['together','Împreună cu părinții'],['any','Depinde de zi'],['gift','E pentru cadou']] },\n        ];\n        const step = Math.min(s.quizStep, 3);\n        const done = step >= 3;\n        const cur = qq[step] || qq[0];\n        const qa = s.quizAns;\n        let qr = P.slice();\n        if(qa.age) qr = qr.filter(p=>this.productAgeBand(p)===qa.age);\n        if(qa.interest){ const bi = qr.filter(p=>p.cat===qa.interest||(p.skills||[]).includes(qa.interest)); if(bi.length) qr = bi; }\n        qr = qr.sort((a,b)=>b.rating-a.rating).slice(0,3);\n        if(!qr.length) qr = P.slice().sort((a,b)=>b.rating-a.rating).slice(0,3);\n        const dots = { bg:'#F5EEE1' }, dotColors=['#D46A4A','#7C9A82','#6E9DC4','#E6A94C'];\n        return {\n          quizActive: !done, quizDone: done, quizStepNum: step+1,\n          quizProgress: [0,1,2].map(i=>({ color: i<=step-1 || (i===step && !done) ? '#7C9A82' : '#ECE4D6' })),\n          quizQuestion: cur,\n          quizOptions: cur.opts.map(([v,l],i)=>({ label:l, bg:'#FBF7EF', border:'#ECE4D6', dot:dotColors[i%4], pick:()=>this.quizPick(cur.key,v) })),\n          quizCanBack: step>0 && !done, quizBack:this.quizBack, quizRestart:this.quizRestart,\n          quizResultTitle:`Am ales ${qr.length} jucării pentru copilul tău`,\n          quizResultSub: qa.age ? `Potrivite pentru ${qa.age==='7+'?'7+ ani':qa.age+' ani'}, exact pe interesul ales.` : 'Selectate după răspunsurile tale.',\n          quizResults: qr,\n        };\n      })(),\n      // search results\n      searchTerm: s.params.q || s.query,\n      ...(() => {\n        const term = (s.params.q || '').trim().toLowerCase();\n        const list = term ? P.filter(p=>p.title.toLowerCase().includes(term)||(p.skills||[]).some(sk=>sk.includes(term))||p.cat.includes(term)) : [];\n        return { searchResultsList:list, searchResultCount:list.length, searchResultsHas:list.length>0, searchResultsEmpty:list.length===0 };\n      })(),\n      // article\n      activeArticle: this.articles.find(a=>a.id===s.params.id) || this.articles[0],\n      // about / contact / faq / shipping\n      aboutValues: this.aboutValues, contactInfo: this.contactInfo, shippingBlocks: this.shippingBlocks,\n      submitContact:(e)=>{ e.preventDefault(); this.setState({contactDone:true}); }, contactDone:s.contactDone,\n      faqItems: this.faqs.map((f,i)=>({ q:f.q, a:f.a, open:s.faqOpen===i, rot:s.faqOpen===i?'rotate(45deg)':'none', toggle:()=>this.toggleFaq(i) })),\n      // search\n      query:s.query, onQuery:(e)=>this.setState({query:e.target.value}),\n      searchKey:(e)=>{ if(e.key==='Enter' && matches.length) this.nav('search',{q:s.query}); },\n      searchIdle: q.length===0, searchHasResults: q.length>0 && matches.length>0, searchEmpty: q.length>0 && matches.length===0,\n      predictive, popularTerms, goSearchResults:()=>this.nav('search',{q:s.query}),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
