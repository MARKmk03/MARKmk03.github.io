  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"ed8f49ce-64ce-4e6f-b52c-cee5052f86c5\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* Organic — design-system tokens and component classes. This file is the source of truth for the system's look; retune it here and see readme.md. */\n/* latin-ext */\n@font-face {\n  font-family: 'Caprasimo';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"ae265ee8-d4fd-4b53-9d11-70041a87968d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Caprasimo';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"22b9dddd-42c4-4d04-94c4-90172d8cf754\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"7226d674-212b-4ef6-a2fc-1e70d11934f5\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"53a20fa6-2a31-4891-be1f-e37b3ced0c32\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"0a579cdf-44ee-4c5a-97eb-9f47ada24185\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"17a66bd4-80f5-4eb6-a2b9-d4ff49e7abb0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"254804b1-b0e5-4000-92c8-2ceeddfaad3f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"690d75ab-4aef-4e40-99bc-97381dd5dbfe\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --color-bg: #f5ead8;\n  --color-surface: #ebddc5;\n  --color-text: #201e1d;\n  --color-accent: #c67139;\n  --color-accent-2: #7a8a5e;\n  --color-divider: color-mix(in srgb, #201e1d 16%, transparent);\n\n  /* Tonal ramps — generated in OKLCH on one shared lightness scale, so the\n     same step of any role matches the others in visual value. */\n  --color-neutral-100: #f9f4ed;\n  --color-neutral-200: #eee7db;\n  --color-neutral-300: #dcd3c4;\n  --color-neutral-400: #c0b6a5;\n  --color-neutral-500: #a19786;\n  --color-neutral-600: #82796a;\n  --color-neutral-700: #645c50;\n  --color-neutral-800: #474238;\n  --color-neutral-900: #2e2b25;\n\n  --color-accent-100: #fff2eb;\n  --color-accent-200: #ffe1d0;\n  --color-accent-300: #ffc6a5;\n  --color-accent-400: #f6a06b;\n  --color-accent-500: #d67f48;\n  --color-accent-600: #b2622d;\n  --color-accent-700: #8c491a;\n  --color-accent-800: #643312;\n  --color-accent-900: #402310;\n\n  --color-accent-2-100: #f0fae1;\n  --color-accent-2-200: #e1eecc;\n  --color-accent-2-300: #ccdbb2;\n  --color-accent-2-400: #aebf92;\n  --color-accent-2-500: #8fa073;\n  --color-accent-2-600: #728157;\n  --color-accent-2-700: #56633f;\n  --color-accent-2-800: #3d472b;\n  --color-accent-2-900: #272e1b;\n\n  --font-heading: \"Caprasimo\", system-ui, sans-serif;\n  --font-heading-weight: 400;\n  --font-body: \"Figtree\", system-ui, sans-serif;\n\n  --space-1: 4.4px;\n  --space-2: 8.8px;\n  --space-3: 13.2px;\n  --space-4: 17.6px;\n  --space-6: 26.4px;\n  --space-8: 35.2px;\n\n  --radius-sm: 8px;\n  --radius-md: 16px;\n  --radius-lg: 28px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2e2b25 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2e2b25 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2e2b25 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.washed{filter:saturate(0.6) contrast(0.85) brightness(1.1) opacity(0.94)}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 1px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: none;\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 1px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n/* — rounded frame: everything softens, small controls go pill — */\n.card, .dialog { border-radius: calc(var(--radius-lg) * 1.15); }\n.btn, .tag, .seg, .input { border-radius: 999px; }\n.input { padding-inline: 14px; }\n\n<\u002Fstyle>\n  <script src=\"64e02e11-e85d-4590-8803-33aaa1a35258\"><\u002Fscript>\n  <style>\n    html,body{margin:0;background:#fff;}\n    *{box-sizing:border-box;}\n    body{color:#1c1c1c;font-family:var(--font-body);}\n    :root{--color-accent:#f5891f;--color-accent-600:#e0741a;--color-accent-700:#c26314;--cm-teal:#159aa1;--cm-teal-dark:#0f7f85;}\n    h1,h2,h3,h4,h5,h6{font-family:var(--font-body);font-weight:700;letter-spacing:-0.02em;line-height:1.15;margin:0;}\n    a{color:var(--color-accent);text-decoration:none;}\n    input,select{font-family:var(--font-body);}\n    ::-webkit-scrollbar{height:9px;width:9px}\n    ::-webkit-scrollbar-thumb{background:#dcdcdc;border-radius:999px}\n    ::-webkit-scrollbar-track{background:transparent}\n    input::placeholder{color:#a6a6a6;}\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#fff;color:#1c1c1c;font-family:var(--font-body);font-size:15px;line-height:1.55;\">\n\n  <!-- ═══════════ HEADER ═══════════ -->\n  <header style=\"position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #ededed;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n      <a sc-camel-on-click=\"{{ goHome }}\" style=\"display:flex;align-items:center;cursor:pointer;flex-shrink:0;\">\n        <img src=\"601d632e-830f-472f-815b-9f419a5d8d8d\" alt=\"Click Market\" style=\"height:42px;width:auto;display:block;\">\n      <\u002Fa>\n      <form sc-camel-on-submit=\"{{ submitSearch }}\" style=\"flex:1 1 300px;display:flex;align-items:center;gap:8px;background:#f5f5f4;border:1px solid #ececec;border-radius:10px;padding:4px 4px 4px 14px;min-width:220px;\">\n        <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#9a9a9a\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;\"><circle cx=\"11\" cy=\"11\" r=\"7\ n-width:20px;height:20px;padding:0 5px;border-radius:999px;background:var(--cm-teal);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;\">{{ cartCount }}<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- sub bar with the ☰ categories trigger -->\n    <div style=\"border-top:1px solid #f0f0f0;\">\n      <div style=\"max-width:1240px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:6px;\">\n        <button sc-camel-on-click=\"{{ toggleMenu }}\" style=\"display:flex;align-items:center;gap:10px;border:none;background:none;cursor:pointer;font-family:var(--font-body);font-weight:700;font-size:14px;color:#1c1c1c;padding:12px 16px 12px 0;\">\n          <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M3 6h18M3 12h18M3 18h18\"><\u002Fpath><\u002Fsvg>\n          Toate categoriile\n          <svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#9a9a9a\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"transform:rotate({{ chevron }});transition:transform .2s ease;\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <span style=\"width:1px;height:20px;background:#e6e6e6;\"><\u002Fspan>\n        <sc-for list=\"{{ quickLinks }}\" as=\"q\" hint-placeholder-count=\"4\">\n          <button sc-camel-on-click=\"{{ q.go }}\" style=\"border:none;background:none;cursor:pointer;font-family:var(--font-body);font-weight:500;font-size:14px;color:#555;padding:12px 14px;white-space:nowrap;\">{{ q.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- mega menu -->\n    <sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div sc-camel-on-click=\"{{ closeMenu }}\" style=\"position:fixed;inset:0;background:rg  <h2 style=\"font-size:22px;margin:32px 0 16px;\">Produsele vânzătorului<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;\">\n      <sc-for list=\"{{ sellerProducts }}\" as=\"p\" hint-placeholder-count=\"6\">\n        <dc-import name=\"ProductCardMin\" product=\"{{ p }}\" on-open=\"{{ openProduct }}\" on-add=\"{{ addToCart }}\" on-fav=\"{{ favToast }}\" hint-size=\"100%,340px\"><\u002Fdc-import>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ═══════════ FOOTER ═══════════ -->\n  <footer style=\"margin-top:48px;border-top:1px solid #ededed;background:#fafafa;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:44px 20px 28px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:32px;\">\n      <div style=\"max-width:280px;\">\n        <div style=\"margin-bottom:14px;\">\n          <img src=\"601d632e-830f-472f-815b-9f419a5d8d8d\" alt=\"Click Market\" style=\"height:38px;width:auto;display:block;\">\n        <\u002Fdiv>\n        <p style=\"font-size:13px;line-height:1.6;margin:0;color:#777;\">Magazin online cu produse alese cu grijă și livrare rapidă în toată țara.<\u002Fp>\n      <\u002Fdiv>\n      <sc-for list=\"{{ footerCols }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <div>\n          <h4 style=\"font-size:13px;margin:0 0 12px;letter-spacing:.02em;\">{{ c.title }}<\u002Fh4>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <sc-for list=\"{{ c.links }}\" as=\"lnk\" hint-placeholder-count=\"4\">\n              <a style=\"font-size:13px;color:#777;cursor:pointer;\">{{ lnk }}<\u002Fa>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid #ededed;\">\n      <div style=\"max-width:1240px;margin:0 auto;padding:18px 20px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:12px;color:#9a9a9a; uto & scule',           initial: 'A', subs: ['Organizare auto', 'Întreținere', 'Scule', 'Electrice auto', 'Siguranță'] },\n      { key: 'animale',     name: 'Animale de companie',    initial: 'P', subs: ['Hrănire', 'Adăpătoare', 'Jucării', 'Igienă', 'Culcușuri'] }\n    ];\n    const D = {};\n    this.DEPTS.forEach(d => D[d.key] = d);\n    const mk = (id, title, key, price, old, rating, sold, badge, seller, desc) => ({\n      id, title, deptKey: key, dept: D[key].name, initial: title.charAt(0).toUpperCase(),\n      price, old, rating, sold, badge, seller, desc,\n      features: ['Calitate verificată de echipa noastră', 'Ambalare atentă pentru transport', 'Suport prin chat în aceeași zi', 'Factură și garanție incluse']\n    });\n    this.PRODUCTS = [\n      mk('p1',  'Lampă de birou pliabilă LED, 3 trepte', 'electronice', 89, 129, 4.7, 2140, 'Recomandat', 'Atelier Nord', 'Lumină caldă sau rece, reglabilă în trei trepte, cu braț pliabil și consum redus. Perfectă pentru birou, citit sau atelier.'),\n      mk('p2',  'Set organizare bucătărie, 6 piese', 'casa', 59, 79, 4.5, 980, null, 'Click Partener', 'Șase recipiente etanșe, modulare, care se stivuiesc perfect. Păstrează cerealele, făina și pastele proaspete și la vedere.'),\n      mk('p3',  'Rucsac minimalist impermeabil 18L', 'moda', 119, 159, 4.8, 3410, 'Recomandat', 'Atelier Nord', 'Material impermeabil, buzunar căptușit pentru laptop de 15\", port USB ascuns. Ușor, discret și rezistent la ploaie.'),\n      mk('p4',  'Perie facială din silicon', 'frumusete', 45, 69, 4.4, 640, null, 'Click Partener', 'Silicon moale, alimentată USB, cu vibrații fine pentru curățare blândă. Rezistentă la apă, se usucă rapid.'),\n      mk('p5',  'Puzzle din lemn — forme și culori', 'jucarii', 65, null, 4.9, 1520, 'Popular', 'Atelier Nord', 'Lemn natural cu vopsele pe bază de apă, sigure. Dezvoltă recunoașterea formelor și motricitatea fină, de la 2 ani.'),\n      mk('p6',  'Benzi elastice fitness, set 5', 'sport', 39, 55, 4.6, 2760, null, 'Click Partener', 'Cinci niveluri de rezistență, latex natural, cu săculeț de transport. Pentru antrenament acasă sau la sală.'),\n      mk('p7',  'Organizator portbagaj auto pliabil', 'auto', 75, 99, 4.5, 870, null, 'Click Partener', 'Se pliază când nu îl folosești, compartimente rigide și mânere solide. Ține cumpărăturile pe loc în viraje.'),\n      mk('p8',  'Fântână de apă pentru pisici, silențioasă', 'animale', 129, 169, 4.7, 1130, null, 'Atelier Nord', 'Circulă și filtrează apa, motor aproape mut, capacitate 2L. Îți încurajează pisica să bea mai mult.'),\n      mk('p9',  'Căști wireless cu reducere de zgomot', 'electronice', 199, 299, 4.6, 4200, 'Reducere', 'Click Partener', 'Reducere activă a zgomotului, 30h autonomie, încărcare rapidă USB-C. Sunet echilibrat pentru muzică și apeluri.'),\n      mk('p10', 'Set boluri ceramică, 4 bucăți', 'casa', 89, null, 4.8, 720, null, 'Atelier Nord', 'Ceramică smălțuită manual, sigure la cuptor cu microunde și mașină de spălat. Nuanțe calde care se asortează.'),\n      mk('p11', 'Ochelari de soare polarizați', 'moda', 79, 109, 4.5, 1980, null, 'Click Partener', 'Lentile polarizate UV400, ramă ușoară din TR90, cu husă rigidă. Reduc reflexiile la volan și pe apă.'),\n      mk('p12', 'Difuzor de arome ultrasonic 300ml', 'frumusete', 99, 139, 4.7, 1340, null, 'Click Partener', 'Nebulizare ultrasonică silențioasă, lumină ambientală în 7 culori, oprire automată. Umidifică și parfumează camera.'),\n      mk('p13', 'Blocuri de construcție magnetice, 42 piese', 'jucarii', 149, 189, 4.9, 2610, 'Nou', 'Atelier Nord', 'Piese magnetice colorate care se prind pe orice latură. Construcții 2D și 3D care dezvoltă gândirea spațială.'),\n      mk('p14', 'Sticlă termos din inox 750ml', 'sport', 55, 75, 4.6, 3050, null, 'Click Partener', 'Perete dublu, păstrează rece 24h și cald 12h. Capac etanș, fără BPA, cu buclă de transport.')\n    ];\n    this.state = {\n      route: 'home', menuOpen: false, selDepts: [], selSubName: null,\n      fMax: 300, fMinR: 0, fSort: 'pop', query: '', curId: null, qty: 1,\n      cart: [], form: {}, deliv: 'courier', pay: 'card',\n      orderNo: null, toast: null, following: false\n    };\n  }\n\n  showToast(msg) {\n    this.setState({ toast: msg });\n    clearTimeout(this._t);\n    this._t = setTimeout(() => this.setState({ toast: null }), 2200);\n  }\n  scrollTop() { try { window.scrollTo(0, 0); } catch (e) {} }\n  go(route) { this.setState({ route, menuOpen: false }); this.scrollTop(); }\n\n  addToCart(p) {\n    this.setState(s => {\n      const cart = s.cart.slice();\n      const i = cart.findIndex(x => x.id === p.id);\n      if (i >= 0) cart[i] = { id: p.id, qty: cart[i].qty + 1 };\n      else cart.push({ id: p.id, qty: 1 });\n      return { cart };\n    });\n    this.showToast('Adăugat în coș');\n  }\n  openProduct(p) { this.setState({ route: 'product', curId: p.id, qty: 1, menuOpen: false }); this.scrollTop(); }\n  gotoDept(key) { this.setState({ route: 'category', selDepts: [key], selSubName: null, fMax: 300, fMinR: 0, fSort: 'pop', menuOpen: false }); this.scrollTop(); }\n  gotoSub(key, name) { this.setState({ route: 'category', selDepts: [key], selSubName: name, fMax: 300, fMinR: 0, fSort: 'pop', menuOpen: false }); this.scrollTop(); }\n  money(n) { return Math.round(n); }\n\n  renderVals() {\n    const s = this.state;\n    const R = s.route;\n    const cur = this.PRODUCTS.find(p => p.id === s.curId) || this.PRODUCTS[0];\n\n    const lines = s.cart.map(c => {\n      const p = this.PRODUCTS.find(x => x.id === c.id);\n      return {\n        id: p.id, title: p.title, dept: p.dept, price: p.price, qty: c.qty, initial: p.initial,\n        lineTotal: this.money(p.price * c.qty),\n        open: () => this.openProduct(p),\n        inc: () => this.setState(st => ({ cart: st.cart.map(x => x.id === c.id ? { id: x.id, qty: x.qty + 1 } : x) })),\n        dec: () => this.setState(st => ({ cart: st.cart.map(x => x.id === c.id ? { id: x.id, qty: Math.max(1, x.qty - 1) } : x) })),\n        remove: () => this.setState(st => ({ cart: st.cart.filter(x => x.id !== c.id) }))\n      };\n    });\n    const subtotal = this.money(lines.reduce((a, l) => a + l.price * l.qty, 0));\n    const FREE = 150;\n    const freeReached = subtotal >= FREE && subtotal > 0;\n    const shipCourier = freeReached ? 0 : 19;\n    const cartCount = s.cart.reduce((a, c) => a + c.qty, 0);\n\n    const depts = this.DEPTS.map(d => ({\n      key: d.key, name: d.name, initial: d.initial,\n      go: () => this.gotoDept(d.key),\n      selected: s.selDepts.indexOf(d.key) >= 0,\n      toggle: () => this.setState(st => {\n        const sel = st.selDepts.slice();\n        const i = sel.indexOf(d.key);\n        if (i >= 0) sel.splice(i, 1); else sel.push(d.key);\n        return { selDepts: sel, selSubName: null };\n      })\n    }));\n    const menuDepts = this.DEPTS.map(d => ({\n      key: d.key, name: d.name, initial: d.initial,\n      go: () => this.gotoDept(d.key),\n      subs: d.subs.map(sub => ({ name: sub, go: () => this.gotoSub(d.key, sub) }))\n    }));\n\n    let cat = this.PRODUCTS.slice();\n    if (s.selDepts.length) cat = cat.filter(p => s.selDepts.indexOf(p.deptKey) >= 0);\n    cat = cat.filter(p => p.price <= s.fMax && p.rating >= s.fMinR);\n    if (s.fSort === 'priceAsc') cat.sort((a, b) => a.price - b.price);\n    else if (s.fSort === 'priceDesc') cat.sort((a, b) => b.price - a.price);\n    else if (s.fSort === 'rating') cat.sort((a, b) => b.rating - a.rating);\n    else cat.sort((a, b) => b.sold - a.sold);\n    const deptName = s.selDepts.length === 1 ? this.DEPTS.find(d => d.key === s.selDepts[0]).name : 'Toate produsele';\n    const catTitle = s.selSubName || deptName;\n\n    const ratingOpts = [\n      { label: 'Toate', v: 0 }, { label: '4.0 și peste', v: 4.0 }, { label: '4.5 și peste', v: 4.5 }\n    ].map(o => ({ label: o.label, selected: s.fMinR === o.v, set: () => this.setState({ fMinR: o.v }) }));\n\n    const q = (s.query || '').trim().toLowerCase();\n    const searchResults = q ? this.PRODUCTS.filter(p =>\n      p.title.toLowerCase().indexOf(q) >= 0 || p.dept.toLowerCase().indexOf(q) >= 0 || p.seller.toLowerCase().indexOf(q) >= 0\n    ) : [];\n\n    const related = this.PRODUCTS.filter(p => p.deptKey === cur.deptKey && p.id !== cur.id)\n      .concat(this.PRODUCTS.filter(p => p.deptKey !== cur.deptKey)).slice(0, 4);\n    const galleryTiles = [1, 2, 3, 4];\n    const discount = cur.old ? Math.round((1 - cur.price / cur.old) * 100) : 0;\n\n    const checkoutShip = s.deliv === 'locker' ? 15 : shipCourier;\n    const checkoutTotal = this.money(subtotal + checkoutShip);\n\n    const sellerProducts = this.PRODUCTS.filter(p => p.seller === 'Atelier Nord');\n    const setForm = (k) => (e) => { const v = e.target.value; this.setState(st => ({ form: { ...st.form, [k]: v } })); };\n    const accent = 'var(--color-accent)';\n\n    return {\n      // shared / nav\n      cartCount, query: s.query, menuOpen: s.menuOpen, chevron: s.menuOpen ? '180deg' : '0deg',\n      depts, menuDepts,\n      quickLinks: [\n        { label: 'Reduceri', go: () => this.go('deals') },\n        { label: 'Cele mai vândute', go: () => { this.setState({ route: 'category', selDepts: [], selSubName: null, fMax: 300, fMinR: 0, fSort: 'pop', menuOpen: false }); this.scrollTop(); } },\n        { label: 'Vânzători', go: () => this.go('seller') },\n        { label: 'Cont', go: () => this.go('account') }\n      ],\n      toggleMenu: () => this.setState(st => ({ menuOpen: !st.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n      goHome: () => this.go('home'),\n      goCart: () => this.go('cart'),\n      goAccount: () => this.go('account'),\n      goCheckout: () => this.go('checkout'),\n      goSeller: () => this.go('seller'),\n      goDeals: () => this.go('deals'),\n      goAllProducts: () => { this.setState({ route: 'category', selDepts: [], selSubName: null, fMax: 300, fMinR: 0, fSort: 'pop', menuOpen: false }); this.scrollTop(); },\n      openProduct: (p) => this.openProduct(p),\n      addToCart: (p) => this.addToCart(p),\n      favToast: () => this.showToast('Adăugat la favorite'),\n      onQueryInput: (e) => this.setState({ query: e.target.value }),\n      submitSearch: (e) => { if (e && e.preventDefault) e.preventDefault(); this.setState({ route: 'search', menuOpen: false }); this.scrollTop(); },\n\n      // route flags\n      isHome: R === 'home', isCategory: R === 'category' || R === 'deals', isProduct: R === 'product',\n      isSearch: R === 'search', isCart: R === 'cart', isCheckout: R === 'checkout',\n      isConfirm: R === 'confirm', isAccount: R === 'account', isSeller: R === 'seller',\n\n      // home\n      recProducts: this.PRODUCTS.slice().sort((a, b) => b.sold - a.sold).slice(0, 5),\n      dealProducts: this.PRODUCTS.filter(p => p.old).slice(0, 5),\n      valueProps: [\n        { icon: 'M14 4H2v11h12zM14 8h5l3 3v4h-8z', title: 'Livrare rapidă', sub: '2–4 zile în toată țara' },\n        { icon: 'M3 12a9 9 0 1 0 3-6.7L3 8', title: 'Retur 30 de zile', sub: 'Fără întrebări' },\n        { icon: 'M12 2l8 3v6c0 5-3.5 8-8 11-4.5-3-8-6-8-11V5z', title: 'Plată securizată', sub: 'Card sau ramburs' },\n        { icon: 'M8 21h8M12 17v4M4 4h16v9a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4z', title: 'Suport în aceeași zi', sub: 'Chat cu oameni reali' }\n      ],\n\n      // category (deals route reuses category view but pre-filtered to discounted)\n      catProducts: (R === 'deals') ? this.PRODUCTS.filter(p => p.old) : cat,\n      catCount: (R === 'deals') ? this.PRODUCTS.filter(p => p.old).length : cat.length,\n      catEmpty: (R === 'deals') ? false : cat.length === 0,\n      catTitle: (R === 'deals') ? 'Reduceri blânde' : catTitle,\n      fMax: s.fMax, fSort: s.fSort, ratingOpts,\n      setMax: (e) => this.setState({ fMax: Number(e.target.value) }),\n      setSort: (e) => this.setState({ fSort: e.target.value }),\n      clearFilters: () => this.setState({ selDepts: [], selSubName: null, fMax: 300, fMinR: 0, fSort: 'pop' }),\n\n      // product\n      cur: { ...cur, discount, goDept: () => this.gotoDept(cur.deptKey) },\n      qty: s.qty, galleryTiles, related,\n      qtyInc: () => this.setState(st => ({ qty: st.qty + 1 })),\n      qtyDec: () => this.setState(st => ({ qty: Math.max(1, st.qty - 1) })),\n      addCur: () => { const p = cur; this.setState(st => { const cart = st.cart.slice(); const i = cart.findIndex(x => x.id === p.id); if (i >= 0) cart[i] = { id: p.id, qty: cart[i].qty + st.qty }; else cart.push({ id: p.id, qty: st.qty }); return { cart }; }); this.showToast('Adăugat în coș'); },\n      buyNow: () => { const p = cur; this.setState(st => { const cart = st.cart.slice(); const i = cart.findIndex(x => x.id === p.id); if (i >= 0) cart[i] = { id: p.id, qty: cart[i].qty + st.qty }; else cart.push({ id: p.id, qty: st.qty }); return { cart, route: 'checkout' }; }); this.scrollTop(); },\n\n      // search\n      searchResults, searchCount: searchResults.length, searchEmpty: q !== '' && searchResults.length === 0,\n\n      // cart\n      lines, subtotal, cartEmpty: lines.length === 0, cartFull: lines.length > 0,\n      shippingLabel: freeReached ? 'Gratuit' : shipCourier + ' lei',\n      total: this.money(subtotal + shipCourier),\n      freeReached, freeNotReached: !freeReached,\n      freeLeft: this.money(Math.max(0, FREE - subtotal)),\n      freePct: Math.min(100, Math.round(subtotal / FREE * 100)),\n\n      // checkout\n      form: s.form, onName: setForm('name'), onPhone: setForm('phone'), onEmail: setForm('email'),\n      onCounty: setForm('county'), onCity: setForm('city'), onAddress: setForm('address'),\n      delivCourier: s.deliv === 'courier', delivLocker: s.deliv === 'locker',\n      setDelivCourier: () => this.setState({ deliv: 'courier' }), setDelivLocker: () => this.setState({ deliv: 'locker' }),\n      payCard: s.pay === 'card', payCod: s.pay === 'cod',\n      setPayCard: () => this.setState({ pay: 'card' }), setPayCod: () => this.setState({ pay: 'cod' }),\n      payCardBg: s.pay === 'card' ? accent : '#fff', payCardColor: s.pay === 'card' ? '#fff' : '#1c1c1c',\n      payCodBg: s.pay === 'cod' ? accent : '#fff', payCodColor: s.pay === 'cod' ? '#fff' : '#1c1c1c',\n      courierLabel: freeReached ? 'Gratuit' : '19 lei',\n      checkoutShipLabel: checkoutShip === 0 ? 'Gratuit' : checkoutShip + ' lei',\n      checkoutTotal,\n      placeOrder: () => { const no = 'CM' + Math.floor(100000 + Math.random() * 899999); this.setState({ route: 'confirm', orderNo: no, cart: [] }); this.scrollTop(); },\n\n      // confirm\n      orderNo: s.orderNo || 'CM000000',\n\n      // account\n      orders: [\n        { no: 'CM240915', date: '12 iulie 2026', status: 'Livrată',    tagBg: '#f0f6ea', tagColor: '#4a6b34', items: 2, total: 184 },\n        { no: 'CM240902', date: '3 iulie 2026',  status: 'În livrare',  tagBg: '#fbeee4', tagColor: '#8c491a', items: 1, total: 129 },\n        { no: 'CM240815', date: '20 iunie 2026', status: 'Anulată',     tagBg: '#f0f0f0', tagColor: '#777',    items: 1, total: 59 }\n      ],\n\n      // seller\n      sellerProducts, following: s.following,\n      followLabel: s.following ? 'Urmărești ✓' : 'Urmărește',\n      toggleFollow: () => this.setState(st => ({ following: !st.following })),\n\n      // footer\n      footerCols: [\n        { title: 'Click Market', links: ['Despre noi', 'Cariere', 'Vânzători', 'Blog', 'Contact'] },\n        { title: 'Ajutor', links: ['Livrare', 'Retur & rambursare', 'Metode de plată', 'Întrebări frecvente', 'Urmărește comanda'] },\n        { title: 'Categorii', links: ['Electronice', 'Casă & bucătărie', 'Modă', 'Jucării educative', 'Sport'] }\n      ],\n\n      toast: s.toast\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
